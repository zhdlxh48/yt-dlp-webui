dependencies = [
    { name = "fastapi" },
    { name = "pillow" },
    { name = "platformdirs" },
    { name = "psutil" },
    { name = "pydantic" },
    { name = "pydantic-settings" },
    { name = "pystray" },
    { name = "tomlkit" },
    { name = "uvicorn", extra = ["standard"] },
]

